name: Debug Server Issues

on:
  workflow_dispatch: # 手动触发

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Debug server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          echo "🔍 开始调试服务器问题..."
          echo "=================================="
          
          # 检查当前工作目录
          echo "📁 当前工作目录:"
          pwd
          ls -la
          
          # 检查Docker状态
          echo "🐳 Docker状态:"
          docker --version
          docker-compose --version
          
          # 检查所有容器状态
          echo "📋 所有容器状态:"
          docker ps -a
          
          # 检查容器资源使用
          echo "💾 容器资源使用:"
          docker stats --no-stream
          
          # 检查Docker网络
          echo "🌐 Docker网络:"
          docker network ls
          docker network inspect mikko-blog_mikko-network || echo "网络不存在"
          
          # 检查容器日志
          echo "📝 前端容器日志:"
          docker logs mikko_frontend_prod --tail=50 || echo "前端容器不存在"
          
          echo "📝 后端容器日志:"
          docker logs mikko_backend_prod --tail=50 || echo "后端容器不存在"
          
          echo "📝 MySQL容器日志:"
          docker logs mikko_mysql_prod --tail=30 || echo "MySQL容器不存在"
          
          # 检查端口监听
          echo "🔌 端口监听状态:"
          netstat -tlnp | grep -E ":(80|8000|3306)" || echo "没有找到相关端口监听"
          
          # 检查进程
          echo "⚙️ 相关进程:"
          ps aux | grep -E "(nginx|uvicorn|mysql)" || echo "没有找到相关进程"
          
          # 检查环境变量
          echo "🔧 环境变量:"
          if [ -f ".env" ]; then
            echo "✅ .env文件存在"
            echo "环境变量（隐藏敏感信息）:"
            grep -E "^[A-Z_]+" .env | sed 's/=.*/=***/' || echo "没有找到环境变量"
          else
            echo "❌ .env文件不存在"
          fi
          
          # 尝试重启服务
          echo "🔄 尝试重启服务..."
          cd /opt/mikko-blog || echo "无法进入项目目录"
          docker-compose -f docker-compose.prod.yml down
          sleep 5
          docker-compose -f docker-compose.prod.yml up -d
          sleep 10
          
          # 再次检查状态
          echo "📋 重启后容器状态:"
          docker ps -a
          
          echo "=================================="
          echo "🎯 调试完成！"
