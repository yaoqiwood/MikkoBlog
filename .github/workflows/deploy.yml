name: Deploy to Server

on:
  push:
    branches: [ cicd-deploy ]
  pull_request:
    branches: [ cicd-deploy ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build frontend
      run: |
        cd frontend
        npm ci
        npm run build

    - name: Build Docker images
      run: |
        docker build -t mikko-blog-backend:latest -f backend/Dockerfile .
        docker build -t mikko-blog-frontend:latest -f frontend/Dockerfile ./frontend

    - name: Deploy to server
      if: github.ref == 'refs/heads/cicd-deploy'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          # 进入项目目录
          cd /opt/mikko-blog

          # 拉取最新代码
          git pull origin cicd-deploy

          # 停止现有容器
          docker-compose -f docker-compose.prod.yml down

          # 构建新镜像
          docker-compose -f docker-compose.prod.yml build --no-cache

          # 启动服务
          docker-compose -f docker-compose.prod.yml up -d

          # 清理未使用的镜像
          docker image prune -f

          # 检查服务状态
          docker-compose -f docker-compose.prod.yml ps
