name: Deploy to Server

on:
  push:
    branches: [ cicd-deploy ]
  pull_request:
    branches: [ cicd-deploy ]
  workflow_dispatch:  # 添加手动触发支持

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build frontend
      run: |
        cd frontend
        npm ci
        npm run build

    - name: Build Docker images
      run: |
        docker build -t mikko-blog-backend:latest -f backend/Dockerfile .
        docker build -t mikko-blog-frontend:latest -f frontend/Dockerfile ./frontend

    - name: Deploy to server
      if: github.ref == 'refs/heads/cicd-deploy'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          # 检查并创建项目目录
          if [ ! -d "/opt/mikko-blog" ]; then
            echo "Creating project directory..."
            mkdir -p /opt/mikko-blog
            cd /opt/mikko-blog
            echo "Cloning repository..."
            git clone -b cicd-deploy https://github.com/yaoqiwood/MikkoBlog.git .
          else
            echo "Project directory exists, updating..."
            cd /opt/mikko-blog
            # 拉取最新代码
            git pull origin cicd-deploy
          fi

          # 停止现有容器
          docker-compose -f docker-compose.prod.yml down

          # 构建新镜像
          docker-compose -f docker-compose.prod.yml build --no-cache

          # 启动服务
          docker-compose -f docker-compose.prod.yml up -d

          # 清理未使用的镜像
          docker image prune -f

          # 检查服务状态
          docker-compose -f docker-compose.prod.yml ps

          # 等待服务启动
          echo "Waiting for services to start..."
          sleep 30

          # 检查服务健康状态
          echo "Checking service health..."
          curl -f http://localhost:8000/health || echo "Backend health check failed"
          curl -f http://localhost || echo "Frontend health check failed"

          # 显示详细日志
          echo "=== All container status ==="
          docker-compose -f docker-compose.prod.yml ps -a

          echo "=== Nginx container logs ==="
          docker-compose -f docker-compose.prod.yml logs mikko_nginx_prod || echo "Nginx container not found or no logs"

          echo "=== Frontend logs ==="
          docker-compose -f docker-compose.prod.yml logs frontend --tail=20

          echo "=== Backend logs ==="
          docker-compose -f docker-compose.prod.yml logs backend --tail=20

          echo "=== MySQL logs ==="
          docker-compose -f docker-compose.prod.yml logs db --tail=20

          echo "=== Docker network info ==="
          docker network ls
          docker network inspect mikko-blog_mikko-network || echo "Network not found"

          echo "=== Check if nginx.conf exists ==="
          ls -la frontend/nginx.conf || echo "nginx.conf not found"

          echo "=== Check frontend Dockerfile ==="
          ls -la frontend/Dockerfile || echo "Frontend Dockerfile not found"
